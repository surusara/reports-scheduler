# ============================================================================
# reports-scheduler GitLab CI/CD Pipeline
# ============================================================================
# Versioning:
#   - main branch  → image tag: main-<short-sha> (dev snapshot)
#   - git tag v*   → image tag: <semver> (release, promotable to test/prod)
# ============================================================================

stages:
  - build
  - test
  - package
  - publish
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end"
  DOCKER_DRIVER: overlay2

  # Artifactory
  ARTIFACTORY_REGISTRY: artifactory.example.com
  ARTIFACTORY_REPO: docker-local
  IMAGE_NAME: "${ARTIFACTORY_REGISTRY}/${ARTIFACTORY_REPO}/reports-scheduler"

  # Helm
  HELM_RELEASE_NAME: reports-scheduler
  HELM_CHART_PATH: helm

# ---------------------------------------------------------------------------
# Version resolution
# ---------------------------------------------------------------------------
.resolve-version: &resolve-version
  - |
    if [[ -n "$CI_COMMIT_TAG" ]]; then
      # Release: v1.2.0 → 1.2.0
      export APP_VERSION="${CI_COMMIT_TAG#v}"
      export IMAGE_TAG="${APP_VERSION}"
    elif [[ "$CI_COMMIT_BRANCH" == "main" ]]; then
      # Snapshot from main: main-abc1234
      export APP_VERSION="$(grep '<revision>' pom.xml | sed 's/.*<revision>\(.*\)<\/revision>.*/\1/')"
      export IMAGE_TAG="main-${CI_COMMIT_SHORT_SHA}"
    else
      # Feature branch: feature-abc1234
      export APP_VERSION="$(grep '<revision>' pom.xml | sed 's/.*<revision>\(.*\)<\/revision>.*/\1/')"
      export BRANCH_SLUG=$(echo "$CI_COMMIT_REF_SLUG" | cut -c1-20)
      export IMAGE_TAG="${BRANCH_SLUG}-${CI_COMMIT_SHORT_SHA}"
    fi
    echo "APP_VERSION=${APP_VERSION}"
    echo "IMAGE_TAG=${IMAGE_TAG}"

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .m2/repository

# ===========================================================================
# BUILD
# ===========================================================================
build:
  stage: build
  image: eclipse-temurin:21-jdk-alpine
  before_script:
    - apk add --no-cache maven
    - *resolve-version
  script:
    - mvn ${MAVEN_CLI_OPTS} clean package -DskipTests -Drevision=${APP_VERSION}
  artifacts:
    paths:
      - target/reports-scheduler.jar
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_MERGE_REQUEST_ID

# ===========================================================================
# TEST
# ===========================================================================
test:
  stage: test
  image: eclipse-temurin:21-jdk-alpine
  before_script:
    - apk add --no-cache maven
    - *resolve-version
  script:
    - mvn ${MAVEN_CLI_OPTS} test -Drevision=${APP_VERSION}
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_MERGE_REQUEST_ID

# ===========================================================================
# PACKAGE (Docker build)
# ===========================================================================
package:
  stage: package
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - *resolve-version
  script:
    - docker build
        --build-arg APP_VERSION=${APP_VERSION}
        -t ${IMAGE_NAME}:${IMAGE_TAG}
        .
    # Tag with 'latest' only for releases
    - |
      if [[ -n "$CI_COMMIT_TAG" ]]; then
        docker tag ${IMAGE_NAME}:${IMAGE_TAG} ${IMAGE_NAME}:latest
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != "main"
      when: manual
      allow_failure: true

# ===========================================================================
# PUBLISH (Push to Artifactory)
# ===========================================================================
publish:
  stage: publish
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - *resolve-version
    - echo "${ARTIFACTORY_PASSWORD}" | docker login ${ARTIFACTORY_REGISTRY} -u "${ARTIFACTORY_USER}" --password-stdin
  script:
    - docker push ${IMAGE_NAME}:${IMAGE_TAG}
    - |
      if [[ -n "$CI_COMMIT_TAG" ]]; then
        docker push ${IMAGE_NAME}:latest
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != "main"
      when: manual
      allow_failure: true

# ===========================================================================
# DEPLOY - DEV (automatic on main)
# ===========================================================================
deploy-dev:
  stage: deploy
  image: alpine/helm:3.14
  before_script:
    - *resolve-version
  script:
    - helm upgrade --install ${HELM_RELEASE_NAME} ${HELM_CHART_PATH}
        -f ${HELM_CHART_PATH}/values.yaml
        -f ${HELM_CHART_PATH}/values-dev.yaml
        --set image.tag=${IMAGE_TAG}
        --namespace reports-scheduler-dev
        --create-namespace
  environment:
    name: dev
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != "main"
      when: manual
      allow_failure: true

# ===========================================================================
# DEPLOY - TEST (manual, requires IMAGE_TAG variable)
# ===========================================================================
deploy-test:
  stage: deploy
  image: alpine/helm:3.14
  script:
    - |
      if [ -z "${IMAGE_TAG}" ]; then
        echo "ERROR: IMAGE_TAG variable is required. Provide the release version (e.g., 1.2.0)"
        exit 1
      fi
    - helm upgrade --install ${HELM_RELEASE_NAME} ${HELM_CHART_PATH}
        -f ${HELM_CHART_PATH}/values.yaml
        -f ${HELM_CHART_PATH}/values-test.yaml
        --set image.tag=${IMAGE_TAG}
        --namespace reports-scheduler-test
        --create-namespace
  environment:
    name: test
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: manual
  allow_failure: false

# ===========================================================================
# DEPLOY - PROD (manual + approval, requires IMAGE_TAG variable)
# ===========================================================================
deploy-prod:
  stage: deploy
  image: alpine/helm:3.14
  script:
    - |
      if [ -z "${IMAGE_TAG}" ]; then
        echo "ERROR: IMAGE_TAG variable is required. Provide the release version (e.g., 1.2.0)"
        exit 1
      fi
    - helm upgrade --install ${HELM_RELEASE_NAME} ${HELM_CHART_PATH}
        -f ${HELM_CHART_PATH}/values.yaml
        -f ${HELM_CHART_PATH}/values-prod.yaml
        --set image.tag=${IMAGE_TAG}
        --namespace reports-scheduler-prod
        --create-namespace
  environment:
    name: prod
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: manual
  allow_failure: false
